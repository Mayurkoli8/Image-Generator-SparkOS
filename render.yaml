services:
  - type: web
    name: brandposter-ai
    env: node
    plan: starter
    buildCommand: npm ci && npm run render-build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: OPENAI_IMAGE_QUALITY
        value: medium
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 20
      - key: PUBLIC_APP_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
